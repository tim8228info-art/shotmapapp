name: flutter_app
description: Shotmap - あなたのお気に入りが誰かの最高の景色になる写真スポット共有マップアプリ
publish_to: 'none'
version: 1.0.1+21

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & アイコン
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1

  # 状態管理
  provider: 6.1.5+1

  # ローカルストレージ
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # HTTP
  http: 1.5.0

  # URL起動（SNS外部遷移）
  url_launcher: ^6.3.1

  # 位置情報
  geolocator: 13.0.2
  geocoding: 3.0.0

  # マップ（Google Maps - Android/iOS/Web対応）
  google_maps_flutter: ^2.10.0
  google_maps_flutter_web: ^0.5.10
  # flutter_map は map_picker_screen でも継続使用
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # google_fonts バージョン固定（6.1.0のバグ回避）
  google_fonts: 6.2.1

  # アニメーション
  lottie: ^3.3.1

  # 画像
  image_picker: ^1.1.2

  # Firebase
  firebase_core: 3.6.0
  firebase_app_installations: ^0.3.0+4

  # アプリ内課金（サブスクリプション）iOS + Android 両対応
  in_app_purchase: 3.2.0
  in_app_purchase_android: 0.3.6+4
  in_app_purchase_storekit: 0.3.18+1

  # Sign in with Apple（ガイドライン 4.8 対応）
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
