name: flutter_app
description: Shot map - あなたのお気に入りが誰かの最高の景色になる写真スポット共有マップアプリ
publish_to: 'none'
version: 1.0.3+25

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & icons
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1

  # State management
  provider: 6.1.5+1

  # Local storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # HTTP
  http: 1.5.0

  # URL launcher
  url_launcher: ^6.3.1

  # In-app purchase (Play Billing Library 7.x)
  in_app_purchase: ^3.2.0

  # Apple Sign In
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6

  # Image Picker (avatar change)
  image_picker: ^1.1.2

  # Map (Google Maps SDK)
  google_maps_flutter: ^2.9.0
  google_maps_flutter_web: ^0.5.10

  # Firebase Core & Auth (Google Sign-In)
  firebase_core: 3.6.0
  firebase_auth: 5.3.1

  # Google Sign-In SDK
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
