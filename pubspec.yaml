name: flutter_app
description: Shotmap - あなたのお気に入りが誰かの最高の景色になる写真スポット共有マップアプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & アイコン
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1

  # 状態管理
  provider: 6.1.5+1

  # ローカルストレージ
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # HTTP
  http: 1.5.0

  # URL起動（SNS外部遷移）
  url_launcher: ^6.3.1

  # 位置情報
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # マップ（Google Maps - Android/iOS/Web対応）
  google_maps_flutter: ^2.10.0
  google_maps_flutter_web: ^0.5.10
  # flutter_map は map_picker_screen でも継続使用
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # アニメーション
  lottie: ^3.3.1

  # 画像
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
