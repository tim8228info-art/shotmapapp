<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Shot map - あなたのお気に入りが誰かの最高の景色になる">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Shot map">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Shot map</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Maps JavaScript API
    - v=weekly : 安定版（v=beta は新 Dynamic Import 方式になりDart interop非対応）
    - libraries=places : Places Autocomplete に必要
    - loading=async は使わない（Dart JS interop はブロッキングロードが必要）
  -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB8bm3RjpQ29OAw92YZiyaT7t23jQQFoJA&libraries=places&v=weekly"></script>

  <!-- Firebase JS SDK (required for Firebase Auth on Web) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
