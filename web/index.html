<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Shot map - あなたのお気に入りが誰かの最高の景色になる">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Shot map">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Shot map</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Maps JavaScript API
    google_maps_flutter_web (0.5.14) + google_maps (8.2.0) の要件:
    - バージョン指定なし（デフォルト stable）
    - libraries=places : Places Autocomplete に必要
    - loading= パラメータは指定しない（Dart JS interop が同期アクセスするため）
    参照: https://pub.dev/packages/google_maps_flutter_web#modify-webindexhtml
  -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB8bm3RjpQ29OAw92YZiyaT7t23jQQFoJA&libraries=places"></script>

  <!--
    Marker Clusterer (google_maps_flutter_web がクラスタリング機能で必要)
    バージョン 2.5.3 固定（公式 README 指定）
  -->
  <script src="https://cdn.jsdelivr.net/npm/@googlemaps/markerclusterer@2.5.3/dist/index.umd.min.js"></script>

  <!-- Firebase JS SDK (required for Firebase Auth on Web) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
